<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chat App</title>
  <style>
    .chat {
      display: flex;
      flex-direction: column;
      height: 80vh;
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .form {
      display: flex;
    }

    .input {
      flex: 1;
      padding: 10px;
      border: 1px solid #ccc;
    }

    .submit {
      padding: 10px;
      border: 1px solid #ccc;
      background: #eee;
      cursor: pointer;
    }

    .tools {
      margin: 10px 0;
    }

    .tools button {
      padding: 5px 10px;
      margin-right: 5px;
    }
  </style>
</head>

<body>
  <div class="chat">
    <ul class="messages"></ul>
    <form class="form">
      <input class="input" autocomplete="off" />
      <button class="submit">Send</button>
    </form>
  </div>
  <div class="tools">
    <button type="button" onclick="setColor('black')">黒</button>
    <button type="button" onclick="setColor('red')">赤</button>
    <button type="button" onclick="setColor('yellow')">黄</button>
    <button type="button" onclick="setColor('white')">消しゴム</button>
  </div>
  <canvas id="canvas" width="600" height="600" style="border: solid 1px black; background: #fff"></canvas>

  <script>
    let currentColor = 'black'
    function setColor(color) {
      currentColor = color
      console.log("selected:", color)
    }

    function main() {
      const host = location.origin.replace(/^http/, 'ws')
      const ws = new WebSocket(host + '/ws')
      const myId = self.crypto.randomUUID().substr(0, 8)

      const canvas = document.getElementById('canvas')
      const ctx = canvas.getContext('2d')
      ctx.lineWidth = 3
      ctx.lineCap = 'round'

      let drawing = false

      canvas.addEventListener('mousedown', (e) => {
        sendDrawingEvent(e.offsetX, e.offsetY, 'mousedown')
      })
      function mousedown() {
        drawing = true
        ctx.beginPath()
      }

      canvas.addEventListener('mousemove', (e) => {
        if (drawing) {
          sendDrawingEvent(e.offsetX, e.offsetY, 'mousemove')
        }
      })
      function mousemove(x, y, color) {
        if (drawing) {
          ctx.strokeStyle = color
          draw(x, y, true)
        }
      }

      canvas.addEventListener('mouseup', (e) => {
        sendDrawingEvent(e.offsetX, e.offsetY, 'mouseup')
      })
      function mouseup() {
        drawing = false
        ctx.beginPath()
      }

      canvas.addEventListener('mouseout', (e) => {
        sendDrawingEvent(e.offsetX, e.offsetY, 'mouseout')
      })
      function mouseout() {
        drawing = false
      }

      function draw(x, y, dragging) {
        if (dragging) {
          ctx.lineTo(x, y)
          ctx.stroke()
        } else {
          ctx.moveTo(x, y)
        }
      }

      function sendDrawingEvent(x, y, control) {
        const message = JSON.stringify({
          x,
          y,
          control,
          color: currentColor,
          type: 'paint'
        })
        ws.send(message)
      }
      ws.onmessage = (event) => {
        const msg = JSON.parse(event.data)
        if (msg.type === 'paint') {
          const { x, y, control, color } = msg
          console.log({ control })
          if (control === 'mousedown') {
            mousedown()
          } else if (control === 'mouseup') {
            mouseup()
          } else if (control === 'mousemove') {
            mousemove(x, y, color)
          } else if (control === 'mouseout') {
            mouseout()
          }
        }
        if (msg.type === 'chat') {
          const { id, text } = msg
          const messageList = document.querySelector('.messages')
          const li = document.createElement('li')
          if (id === myId) {
            li.textContent = `(${id})自分:` + text
          } else {
            li.textContent = id + ': ' + text
          }
          messageList.appendChild(li)
        }
      }

      const form = document.querySelector('.form')

      form.onsubmit = function (e) {
        e.preventDefault()
        const input = document.querySelector('.input')
        const text = input.value
        ws.send(JSON.stringify({ id: myId, text, type: 'chat' }))
        input.value = ''
        input.focus()
      }

      ws.onerror = function (error) {
        console.error('WebSocket Error: ', error)
      }
    }

    main()
  </script>
</body>

</html>
